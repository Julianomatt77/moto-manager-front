<div class="text-center">
  <p class="text-lg text-blue-800 mb-6">{{ message() }}</p>
  <div class="flex justify-center gap-4">
    <button
      (click)="cancelled.emit()"
      class="px-4 py-2 bg-gray-100 text-gray-700 rounded-lg hover:bg-gray-200 transition duration-150 cursor-pointer"
      type="button"
      title="Annuler">
      Annuler
    </button>
    <button
      (click)="confirmed.emit()"
      class="px-4 py-2 bg-red-500 text-white rounded-lg hover:bg-red-600 transition duration-150 cursor-pointer"
      type="button"
      title="Confirmer">
      Supprimer
    </button>
  </div>
</div>
