<section class="min-h-screen flex flex-col items-center justify-center bg-bg px-4">
  <div class="text-center max-w-md">
    <h1 class="text-8xl font-bold text-primary mb-4">404</h1>
    <h2 class="text-2xl font-semibold text-text mb-6">
      Oups, cette page n'existe pas !
    </h2>
    <p class="text-text/70 mb-8">
      La page que vous cherchez a été déplacée, supprimée ou n'existe plus.
    </p>
    <a [routerLink]="['']"
       class="inline-flex items-center gap-2 font-medium text-white bg-primary hover:bg-secondary rounded-2xl px-8 py-3 transition-all duration-200 cursor-pointer no-underline">
      <app-icon name="home" />
      Retour à l'accueil
    </a>
  </div>
</section>
