<section class="p-6">
  <h2 class="text-2xl text-blue-800 mb-6">{{ buttonLabel }} un entretien</h2>

  <form (submit)="onSubmit(); $event.preventDefault()" class="space-y-4">

    <div>
      <label for="kilometrage" class="block text-sm font-medium text-blue-800 mb-1">Kilométrage</label>
      <input
        id="kilometrage"
        type="number"
        step="any"
        class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition duration-150"
        [formField]="form.kilometrage"
      />
    </div>

    <div>
      <label for="date" class="block text-sm font-medium text-blue-800 mb-1">Date de l'opération</label>
      <input
        id="date"
        type="datetime-local"
        class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition duration-150"
        [formField]="form.date"
      />
      @if (form.date().touched() && form.date().errors().length) {
        <p class="text-red-500 text-sm mt-1">{{ form.date().errors()[0].message }}</p>
      }
    </div>

    <div>
      <label class="block text-sm font-medium text-blue-800 mb-1">Graissage</label>
      <app-toggle
        [checked]="model().graissage"
        (changed)="model.update(m => ({...m, graissage: $event}))"
      />
    </div>

    <div>
      <label class="block text-sm font-medium text-blue-800 mb-1">Lavage</label>
      <app-toggle
        [checked]="model().lavage"
        (changed)="model.update(m => ({...m, lavage: $event}))"
      />
    </div>

    <div>
      <label for="pressionAv" class="block text-sm font-medium text-blue-800 mb-1">Pression avant</label>
      <input
        id="pressionAv"
        type="number"
        step="any"
        class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition duration-150"
        [formField]="form.pressionAv"
      />
    </div>

    <div>
      <label for="pressionAr" class="block text-sm font-medium text-blue-800 mb-1">Pression arrière</label>
      <input
        id="pressionAr"
        type="number"
        step="any"
        class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition duration-150"
        [formField]="form.pressionAr"
      />
    </div>

    <div>
      <label for="moto" class="block text-sm font-medium text-blue-800 mb-1">Moto</label>
      <select
        id="moto"
        class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition duration-150"
        [formField]="form.moto"
      >
        <option value="">Sélectionner une moto</option>
        @for (moto of motoList(); track moto.id) {
          <option [value]="moto.id">{{ moto.name }}</option>
        }
      </select>
      @if (form.moto().touched() && form.moto().errors().length) {
        <p class="text-red-500 text-sm mt-1">{{ form.moto().errors()[0].message }}</p>
      }
    </div>

    <div class="flex gap-4 pt-4">
      <button
        type="button"
        (click)="cancelled.emit()"
        class="px-6 py-2 bg-gray-100 text-gray-700 rounded-lg hover:bg-gray-200 transition duration-150 cursor-pointer "
        title="Annuler"
      >
        Annuler
      </button>
      <button
        type="submit"
        [disabled]="form().invalid()"
        class="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition duration-150 cursor-pointer  disabled:opacity-50"
        title="{{ buttonLabel }}"
      >
        {{ buttonLabel }}
      </button>
    </div>

  </form>
</section>
