<section class="p-6">
  <h2 class="text-2xl font-['Fira_Code'] text-blue-800 mb-6">{{ buttonLabel }} une moto</h2>

  <form (submit)="onSubmit(); $event.preventDefault()" class="space-y-4">

    <div>
      <label for="marque" class="block text-sm font-medium text-blue-800 mb-1">Marque</label>
      <input
        id="marque"
        type="text"
        class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition duration-150"
        [formField]="form.marque"
      />
      @if (form.marque().touched() && form.marque().errors().length) {
        <p class="text-red-500 text-sm mt-1">{{ form.marque().errors()[0].message }}</p>
      }
    </div>

    <div>
      <label for="modele" class="block text-sm font-medium text-blue-800 mb-1">Modèle</label>
      <input
        id="modele"
        type="text"
        class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition duration-150"
        [formField]="form.modele"
      />
      @if (form.modele().touched() && form.modele().errors().length) {
        <p class="text-red-500 text-sm mt-1">{{ form.modele().errors()[0].message }}</p>
      }
    </div>

    <div>
      <label for="year" class="block text-sm font-medium text-blue-800 mb-1">Année</label>
      <select
        id="year"
        class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition duration-150"
        [formField]="form.year"
      >
        <option value="0">Année</option>
        @for (year of years; track year) {
          <option [value]="year">{{ year }}</option>
        }
      </select>
    </div>

    <div class="flex gap-4 pt-4">
      <button
        type="button"
        (click)="cancelled.emit()"
        class="px-6 py-2 bg-gray-100 text-gray-700 rounded-lg hover:bg-gray-200 transition duration-150 cursor-pointer font-['Fira_Sans']"
        title="Annuler"
      >
        Annuler
      </button>
      <button
        type="submit"
        [disabled]="form().invalid()"
        class="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition duration-150 cursor-pointer font-['Fira_Sans'] disabled:opacity-50"
        title="{{ buttonLabel }}"
      >
        {{ buttonLabel }}
      </button>
    </div>

  </form>
</section>
